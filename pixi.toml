[workspace]
authors = ["softwareentrepreneer <softwareentrepreneer@gmail.com>"]
channels = ["conda-forge"]
name = "pfolio"
platforms = ["osx-arm64"]
# updating this needs to also update the version in the ci.yml and templates/ci-workflow-template.yml files
requires-pixi = ">=0.63.2"  # command: pixi workspace requires-pixi set ">=0.63.2"

[tasks]

[tasks.test-all]
depends-on = [
  { task = "test", environment = "py311" },
  { task = "test", environment = "py312" },
  { task = "test", environment = "py313" },
]

[environments]
default = ["py311", "dev", "optional"]
py311 = ["py311", "test", "optional"]
py312 = ["py312", "test", "optional"]
py313 = ["py313", "test", "optional"]

[dependencies]
python = ">=3.11.14"
uv = ">=0.10.2"
libpq = ">=18.1"  # for library "qis", which requires postgresql

[pypi-dependencies]
pfund-kit = ">=0.1.3"
narwhals = ">=2.16.0"
polars = ">=1.38.1"
skfolio = ">=0.15.5"

[feature.optional.pypi-dependencies]

# TEMP
[pypi-options.dependency-overrides]
pfolio = { path = ".", editable = true }
pfund = { path = "../pfund", editable = true }
pfund-kit = { path = "../pfund-kit", editable = true }
pfeed = { path = "../pfeed", editable = true, extras = ["duckdb", "yfinance", "fmp"] }
pfund-plot = { path = "../pfund-plot", editable = true, extras = ["marimo", 'jupyter'] }

[feature.dev.pypi-dependencies]
pfolio = { path = ".", editable = true }
pandas-stubs = ">=2.3.3.260113"
afterpython = ">=0.2.0"
dask = { version = ">=2026.1.2", extras = ["complete", "dataframe"] }
pyspark = { version = ">=4.1.1", extras = ["connect", "pandas-on-spark", "sql"] }
pfeed = { path = "../pfeed", editable = true, extras = ["duckdb", "yfinance", "fmp"] }
pfund-plot = { path = "../pfund-plot", editable = true, extras = ["marimo", 'jupyter'] }
statsmodels = ">=0.14.6"
# TEMP: for reference
qis = ">=3.4.7"
pyfolio-reloaded = ">=0.9.9"
empyrical-reloaded = ">=0.5.12"
quantstats = ">=0.0.81"
thepassiveinvestor = ">=1.2.2"

[feature.test.pypi-dependencies]
pytest = ">=9.0.2"
pytest-cov = ">=7.0.0"
pytest-mock = ">=3.15.1"
pytest-xdist = ">=3.8.0"
[feature.test.tasks]
test = "pytest"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"
